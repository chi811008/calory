<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>卡路里赤字趨勢</title>
  <style>
    :root {
      --met: #16A34A;
      --near: #F59E0B;
      --over: #DC2626;
      --track: #E5E7EB;
      --sub: #6B7280;
      --text: #111827;
      --bg: #F4F5F7;
      --surface: #FFFFFF;
      --line: #EEF0F3;
      --radius: 16px;
      --shadow: 0 1px 3px rgba(17, 24, 39, 0.06), 0 8px 24px rgba(17, 24, 39, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      padding: 20px 16px calc(28px + env(safe-area-inset-bottom));
      max-width: 560px;
      margin: 0 auto;
    }
    .app { opacity: 0; transition: opacity 240ms cubic-bezier(0.16, 1, 0.3, 1); }
    .app.ready { opacity: 1; }

    /* Streak header — 大數字主視覺 */
    .streak {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }
    .streak .num {
      font-size: clamp(2.6rem, 1.6rem + 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--met);
    }
    .streak .num.zero { color: var(--sub); }
    .streak .unit { font-size: 1rem; color: var(--sub); font-weight: 600; }
    .badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--met);
      background: rgba(22, 163, 74, 0.1);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .badge:empty { display: none; }

    /* 週統計 — bento 小卡 */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 12px;
      box-shadow: var(--shadow);
    }
    .stat .label { font-size: 0.72rem; color: var(--sub); font-weight: 600; }
    .stat .value { font-size: 1.4rem; font-weight: 750; letter-spacing: -0.02em; margin-top: 2px; }
    .stat .value small { font-size: 0.82rem; color: var(--sub); font-weight: 600; }

    /* 圖表卡 */
    .chart-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 16px 14px;
      box-shadow: var(--shadow);
    }
    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .chart-head h2 { font-size: 0.95rem; font-weight: 700; }
    .chart-head .hint { font-size: 0.72rem; color: var(--sub); }

    /* 區間切換 segmented control */
    .seg {
      display: inline-flex;
      background: var(--bg);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .seg button {
      border: 0;
      background: transparent;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 650;
      color: var(--sub);
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: color 150ms, background 150ms;
    }
    .seg button[aria-pressed="true"] {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.12);
    }
    .seg button:focus-visible { outline: 2px solid var(--met); outline-offset: 2px; }

    /* 各餐別的 7 日期 tab:撐滿一列, 窄螢幕可橫向捲動 */
    .daytabs { display: flex; width: 100%; margin: 2px 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .daytabs button { flex: 1 0 auto; white-space: nowrap; }

    .chart-wrap { width: 100%; }
    svg { width: 100%; height: auto; display: block; }
    .axis-label { fill: var(--sub); font-size: 27px; }
    .target-label { fill: var(--near); font-size: 27px; font-weight: 700; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 12px;
      font-size: 0.72rem;
      color: var(--sub);
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }

    .msg {
      text-align: center;
      color: var(--sub);
      padding: 48px 20px;
      font-size: 0.9rem;
    }
    .msg.error { color: var(--over); }
    .empty-note { text-align: center; color: var(--sub); font-size: 0.82rem; padding: 28px 0; }
    .goal-meta { text-align: center; margin-top: 10px; font-size: 0.95rem; color: var(--text); }
    .goal-meta b { font-size: 1.5rem; font-weight: 800; color: #E11D48; letter-spacing: -0.02em; }
  </style>
</head>
<body>
  <div id="root">
    <div class="msg" id="boot">讀取中…</div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    'use strict';

    var LIFF_ID = '__LIFF_ID__';
    var COLOR = { met: '#16A34A', near: '#F59E0B', over: '#DC2626', track: '#E5E7EB', sub: '#6B7280', heart: '#E11D48' };
    // 各餐別色盤 (對齊 MEAL_LABELS 順序)
    var MEAL_COLOR = {
      breakfast: '#F59E0B', lunch: '#16A34A', dinner: '#6366F1',
      snack: '#EC4899', drink: '#06B6D4'
    };
    var state = { range: 14, idToken: null, data: null, mealDay: null };

    function el(id) { return document.getElementById(id); }
    function showMsg(text, isError) {
      el('root').innerHTML = '<div class="msg' + (isError ? ' error' : '') + '">' + text + '</div>';
    }

    function fmtDay(iso) {
      // YYYY-MM-DD → M/D
      var p = iso.split('-');
      return Number(p[1]) + '/' + Number(p[2]);
    }

    function renderChart(series, target) {
      var W = 480, H = 290;
      var padL = 8, padR = 8, padTop = 34, padBottom = 50;
      var n = series.length;
      var plotW = W - padL - padR;
      var plotH = H - padTop - padBottom;
      var slot = plotW / n;
      var barW = Math.max(3, Math.min(slot * 0.62, 26));

      var vals = series.map(function (p) { return p.logged ? p.deficit : 0; });
      var maxV = Math.max.apply(null, vals.concat([target]));
      var minV = Math.min.apply(null, vals.concat([0]));
      if (maxV <= minV) maxV = minV + 1;
      var span = maxV - minV;
      function y(v) { return padTop + (maxV - v) / span * plotH; }
      var zeroY = y(0);
      var targetY = y(target);

      var parts = [];
      // 目標赤字虛線
      parts.push('<line x1="' + padL + '" y1="' + targetY.toFixed(1) + '" x2="' + (W - padR) +
        '" y2="' + targetY.toFixed(1) + '" stroke="' + COLOR.near +
        '" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>');
      parts.push('<text class="target-label" x="' + padL + '" y="' + (targetY - 8).toFixed(1) +
        '">目標 ' + target + '</text>');
      // 零線
      parts.push('<line x1="' + padL + '" y1="' + zeroY.toFixed(1) + '" x2="' + (W - padR) +
        '" y2="' + zeroY.toFixed(1) + '" stroke="' + COLOR.track + '" stroke-width="1"/>');

      var labelEvery = n <= 7 ? 2 : (n <= 14 ? 4 : 8);
      for (var i = 0; i < n; i++) {
        var p = series[i];
        var cx = padL + slot * i + slot / 2;
        var bx = cx - barW / 2;
        if (p.logged) {
          var yv = y(p.deficit);
          var top = Math.min(yv, zeroY);
          var hgt = Math.max(1.5, Math.abs(zeroY - yv));
          var fill = p.deficit < 0 ? COLOR.over : (p.met ? COLOR.met : COLOR.near);
          parts.push('<rect x="' + bx.toFixed(1) + '" y="' + top.toFixed(1) + '" width="' +
            barW.toFixed(1) + '" height="' + hgt.toFixed(1) + '" rx="2.5" fill="' + fill + '"/>');
        } else {
          // 未記錄日:零線上一個淺色小點, 留白可見
          parts.push('<circle cx="' + cx.toFixed(1) + '" cy="' + zeroY.toFixed(1) +
            '" r="1.6" fill="' + COLOR.track + '"/>');
        }
        // 由末端 (今天) 往回每 labelEvery 標一個, 確保間距 ≥ labelEvery、末日必標,
        // 不會出現「倒數第二日」與「今天」兩個大字擠在一起。
        if ((n - 1 - i) % labelEvery === 0) {
          parts.push('<text class="axis-label" x="' + cx.toFixed(1) + '" y="' + (H - 14) +
            '" text-anchor="middle">' + fmtDay(p.date) + '</text>');
        }
      }

      return '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" ' +
        'aria-label="每日卡路里赤字長條圖">' + parts.join('') + '</svg>';
    }

    function renderMealChart(meals) {
      var W = 480, H = 260;
      var padL = 8, padR = 8, padTop = 46, padBottom = 46;
      var n = meals.length;
      var plotW = W - padL - padR;
      var plotH = H - padTop - padBottom;
      var slot = plotW / n;
      var barW = Math.min(slot * 0.56, 48);

      var maxV = Math.max.apply(null, meals.map(function (m) { return m.calories; }).concat([1]));
      var baseY = padTop + plotH; // 底線
      function h(v) { return v <= 0 ? 0 : Math.max(2, v / maxV * plotH); }

      var parts = [];
      // 底線
      parts.push('<line x1="' + padL + '" y1="' + baseY.toFixed(1) + '" x2="' + (W - padR) +
        '" y2="' + baseY.toFixed(1) + '" stroke="' + COLOR.track + '" stroke-width="1"/>');

      for (var i = 0; i < n; i++) {
        var m = meals[i];
        var cx = padL + slot * i + slot / 2;
        var bx = cx - barW / 2;
        var hgt = h(m.calories);
        var top = baseY - hgt;
        var fill = MEAL_COLOR[m.meal] || COLOR.sub;
        if (m.calories > 0) {
          parts.push('<rect x="' + bx.toFixed(1) + '" y="' + top.toFixed(1) + '" width="' +
            barW.toFixed(1) + '" height="' + hgt.toFixed(1) + '" rx="3" fill="' + fill + '"/>');
        } else {
          // 0 卡:底線上一條細小空條, 維持並排可見
          parts.push('<rect x="' + bx.toFixed(1) + '" y="' + (baseY - 2).toFixed(1) + '" width="' +
            barW.toFixed(1) + '" height="2" rx="1" fill="' + COLOR.track + '"/>');
        }
        // 卡數標於條頂
        parts.push('<text class="axis-label" x="' + cx.toFixed(1) + '" y="' +
          (top - 8).toFixed(1) + '" text-anchor="middle">' + m.calories + '</text>');
        // 餐別名標於底
        parts.push('<text class="axis-label" x="' + cx.toFixed(1) + '" y="' + (H - 14) +
          '" text-anchor="middle">' + m.label + '</text>');
      }

      return '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" ' +
        'aria-label="各餐別攝取熱量長條圖">' + parts.join('') + '</svg>';
    }

    // 減重目標愛心:每顆 = 1 公斤, 依 fill 比例 (0..1) 由下往上填滿。
    var HEART_PATH = 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3' +
      'c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5' +
      'c0 3.78-3.4 6.86-8.55 11.54L12 21.35z';

    function renderGoalHearts(goal) {
      var fills = goal.hearts;
      var n = fills.length;
      var W = 480;
      var slot = W / n;
      var size = Math.min(slot * 0.82, 96);
      var H = size + 16;
      var sc = size / 24;
      var defs = [], parts = [];
      for (var i = 0; i < n; i++) {
        var f = Math.max(0, Math.min(1, fills[i]));
        var x = slot * i + (slot - size) / 2;
        var clipId = 'hc' + i;
        // clip 矩形由下往上:填滿 f 比例 → 高度 24f, 從 y=24(1-f) 起。
        defs.push('<clipPath id="' + clipId + '"><rect x="0" y="' + (24 * (1 - f)).toFixed(2) +
          '" width="24" height="' + (24 * f).toFixed(2) + '"/></clipPath>');
        parts.push('<g transform="translate(' + x.toFixed(1) + ',8) scale(' + sc.toFixed(3) + ')">' +
          '<path d="' + HEART_PATH + '" fill="' + COLOR.track + '"/>' +
          '<path d="' + HEART_PATH + '" fill="' + COLOR.heart + '" clip-path="url(#' + clipId + ')"/>' +
          '<path d="' + HEART_PATH + '" fill="none" stroke="' + COLOR.heart +
          '" stroke-width="1.2" opacity="0.55"/>' +
          '</g>');
      }
      return '<svg viewBox="0 0 ' + W + ' ' + H.toFixed(1) + '" role="img" ' +
        'aria-label="減重目標愛心進度">' + '<defs>' + defs.join('') + '</defs>' +
        parts.join('') + '</svg>';
    }

    function view(data) {
      var s = data.series;
      var hasData = s.some(function (p) { return p.logged; });
      var streakZero = data.streak === 0;

      var html = '<div class="app" id="app">';
      // streak
      html += '<div class="streak"><span class="num' + (streakZero ? ' zero' : '') + '">' +
        (streakZero ? '0' : '🔥 ' + data.streak) + '</span><span class="unit">' +
        (streakZero ? '尚未開始連續達標' : '天連續達標') + '</span></div>';
      html += '<div class="badge">' + (data.badge || '') + '</div>';

      // 減重目標愛心卡 (全程累積, 不隨區間變)
      if (data.goal) {
        var g = data.goal;
        var lost = g.lostKg;
        var metaText = lost >= 0
          ? '已減 <b>' + lost.toFixed(2) + '</b> / ' + g.goalKg + ' 公斤'
          : '目前淨增 <b>' + Math.abs(lost).toFixed(2) + '</b> 公斤';
        html += '<div class="chart-card" style="margin-bottom:18px">' +
          '<div class="chart-head"><h2>減重目標</h2>' +
          '<span class="hint">' + (g.achieved ? '已達成 🎉' : '全程累積') + '</span></div>' +
          '<div class="chart-wrap">' + renderGoalHearts(g) + '</div>' +
          '<div class="goal-meta">' + metaText + '</div></div>';
      } else {
        html += '<div class="chart-card" style="margin-bottom:18px">' +
          '<div class="empty-note">想看減重目標進度?<br>在 LINE 打「目標 4 公斤」設定 🎯</div></div>';
      }

      // week stats
      var w = data.week;
      html += '<div class="stats">' +
        '<div class="stat"><div class="label">本週達標</div><div class="value">' +
          w.daysMet + '<small>/' + w.daysLogged + ' 天</small></div></div>' +
        '<div class="stat"><div class="label">平均攝取</div><div class="value">' +
          w.avgIntake + '<small> 卡</small></div></div>' +
        '<div class="stat"><div class="label">本週赤字</div><div class="value">' +
          w.totalDeficit + '<small> 卡</small></div></div>' +
        '</div>';

      // chart card
      html += '<div class="chart-card">' +
        '<div class="chart-head"><h2>每日赤字</h2>' +
        '<div class="seg" role="group" aria-label="天數區間">' +
        [7, 14, 30].map(function (r) {
          return '<button data-range="' + r + '" aria-pressed="' +
            (r === state.range) + '">' + r + '天</button>';
        }).join('') + '</div></div>';

      if (hasData) {
        html += '<div class="chart-wrap">' + renderChart(s, data.target) + '</div>';
        html += '<div class="legend">' +
          '<span><i class="dot" style="background:' + COLOR.met + '"></i>達標</span>' +
          '<span><i class="dot" style="background:' + COLOR.near + '"></i>有赤字未達標</span>' +
          '<span><i class="dot" style="background:' + COLOR.over + '"></i>吃超標</span>' +
          '</div>';
      } else {
        html += '<div class="empty-note">這段期間還沒有記錄 📭<br>回 LINE 記一餐就會出現囉</div>';
      }
      html += '</div>'; // /chart-card (每日赤字)

      // 各餐別攝取圖卡:過往 7 天, 每天一個 tab (末筆=今天)。
      var mealDays = data.mealDays || [];
      var di = state.mealDay;
      if (di == null || di < 0 || di >= mealDays.length) di = mealDays.length - 1; // 預設今天
      var dayMeals = mealDays[di] ? mealDays[di].meals : [];
      var hasMeal = dayMeals.some(function (m) { return m.calories > 0; });
      var isToday = di === mealDays.length - 1;
      html += '<div class="chart-card" style="margin-top:14px">' +
        '<div class="chart-head"><h2>各餐別攝取</h2>' +
        '<span class="hint">' + (isToday ? '今天' : fmtDay(mealDays[di].date)) + '</span></div>';
      // 7 個日期 tab
      html += '<div class="seg daytabs" role="group" aria-label="選擇日期">';
      for (var mi = 0; mi < mealDays.length; mi++) {
        var last = mi === mealDays.length - 1;
        html += '<button data-mealday="' + mi + '" aria-pressed="' + (mi === di) + '">' +
          (last ? '今天' : fmtDay(mealDays[mi].date)) + '</button>';
      }
      html += '</div>';
      if (hasMeal) {
        html += '<div class="chart-wrap">' + renderMealChart(dayMeals) + '</div>';
      } else {
        html += '<div class="empty-note">' + (isToday ? '今天' : '這天') + '還沒有飲食記錄 🍽️</div>';
      }
      html += '</div>'; // /chart-card (各餐別)

      html += '</div>'; // /app

      el('root').innerHTML = html;
      requestAnimationFrame(function () {
        var app = el('app');
        if (app) app.classList.add('ready');
      });

      // 區間切換 (重新向後端取資料)
      var rangeBtns = document.querySelectorAll('.seg button[data-range]');
      for (var i = 0; i < rangeBtns.length; i++) {
        rangeBtns[i].addEventListener('click', function (e) {
          var r = Number(e.currentTarget.getAttribute('data-range'));
          if (r === state.range) return;
          state.range = r;
          load();
        });
      }

      // 各餐別日期 tab (純前端切換, 資料已在 data.mealDays 內, 不需重新取)
      var dayBtns = document.querySelectorAll('.seg button[data-mealday]');
      for (var j = 0; j < dayBtns.length; j++) {
        dayBtns[j].addEventListener('click', function (e) {
          var d = Number(e.currentTarget.getAttribute('data-mealday'));
          if (d === state.mealDay) return;
          state.mealDay = d;
          view(state.data);
        });
      }
    }

    function load() {
      var url = '/api/dashboard?range=' + state.range;
      fetch(url, { headers: { Authorization: 'Bearer ' + state.idToken } })
        .then(function (res) {
          if (res.status === 401) throw new Error('登入驗證失敗,請從 LINE 重新開啟');
          if (!res.ok) throw new Error('伺服器忙線中,稍後再試');
          return res.json();
        })
        .then(function (body) {
          if (!body.success) throw new Error(body.error || '載入失敗');
          state.data = body.data;
          view(body.data);
        })
        .catch(function (err) {
          showMsg(err.message || '載入失敗', true);
        });
    }

    function init() {
      if (!window.liff || !LIFF_ID) {
        showMsg('LIFF 尚未設定,請聯絡管理員', true);
        return;
      }
      liff.init({ liffId: LIFF_ID })
        .then(function () {
          if (!liff.isLoggedIn()) { liff.login(); return; }
          var token = liff.getIDToken();
          if (!token) throw new Error('無法取得登入憑證');
          state.idToken = token;
          load();
        })
        .catch(function (err) {
          showMsg('初始化失敗:' + (err && err.message ? err.message : err), true);
        });
    }

    init();
  </script>
</body>
</html>
